<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Vendas | Caldos Paes</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #010d0a; color: #f3d9a1; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #04241c; border: 1px solid #d4af37; padding: 20px; border-radius: 15px; margin: 10px auto; max-width: 400px; }
        .valor { font-size: 2rem; font-weight: bold; color: #fff; }
        button { background: #d4af37; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; max-width: 400px; }
        .lista { margin-top: 20px; text-align: left; max-width: 400px; margin-left: auto; margin-right: auto; font-size: 0.9rem; }
        .item-pedido { border-bottom: 1px solid #222; padding: 10px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <h1>Relatório Mensal</h1>
    
    <div class="card">
        <span>Faturamento do Mês</span>
        <div class="valor" id="total">R$ 0,00</div>
    </div>

    <div class="card">
        <span>Total de Pedidos</span>
        <div class="valor" id="qtd">0</div>
    </div>

    <button onclick="puxarVendas()">ATUALIZAR RELATÓRIO</button>

    <div class="lista" id="detalhes"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAPvJJ9_O8GgLx3f7bCdbNfhzwuNwFBCuw",
        authDomain: "caldos-paes.firebaseapp.com",
        projectId: "caldos-paes",
        storageBucket: "caldos-paes.firebasestorage.app",
        messagingSenderId: "926863375495",
        appId: "1:926863375495:web:635a5b8986b986deeb4c22"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function puxarVendas() {
        const querySnapshot = await db.collection("pedidos").get();
        let somaTotal = 0;
        let contador = 0;
        let htmlPedidos = "";

        const mesAtual = new Date().getMonth();
        const anoAtual = new Date().getFullYear();

        querySnapshot.forEach((doc) => {
            const pedido = doc.data();
            
            // Tenta ler a data do pedido
            const partesData = pedido.data.split(',')[0].split('/');
            const dataObjeto = new Date(partesData[2], partesData[1] - 1, partesData[0]);

            if (dataObjeto.getMonth() === mesAtual && dataObjeto.getFullYear() === anoAtual) {
                // Limpa o valor (tira "R$", tira espaços) e soma
                let valorLimpo = pedido.total.replace('R$', '').replace(',', '.').trim();
                somaTotal += parseFloat(valorLimpo);
                contador++;

                htmlPedidos += `
                    <div class="item-pedido">
                        <span>${pedido.data.split(' ')[0]} - ${pedido.pagamento}</span>
                        <b>R$ ${valorLimpo}</b>
                    </div>`;
            }
        });

        document.getElementById('total').innerText = `R$ ${somaTotal.toFixed(2)}`;
        document.getElementById('qtd').innerText = contador;
        document.getElementById('detalhes').innerHTML = htmlPedidos;
    }
</script>
</body>
