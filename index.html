<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caldos Paes | Sistema VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --v-noite: #010d0a;
            --v-imperial: #04241c;
            --ouro-brilho: #f3d9a1;
            --ouro-base: #d4af37;
            --ouro-gradiente: linear-gradient(145deg, #d4af37, #f3d9a1, #b3863a);
            --borda: 1px solid rgba(212, 175, 55, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--v-noite); color: #fff; overflow-x: hidden; }

        /* Splash Screen */
        #splash {
            position: fixed; inset: 0; background: var(--v-noite);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 1s;
        }
        .draw-logo {
            width: 140px; height: 140px; stroke: var(--ouro-base); stroke-width: 1.5; fill: none;
            stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 3s forwards;
        }
        @keyframes draw { to { stroke-dashoffset: 0; filter: drop-shadow(0 0 15px var(--ouro-brilho)); } }
        .splash-title { font-family: 'Cinzel'; color: var(--ouro-brilho); letter-spacing: 8px; margin-top: 25px; font-weight: 900; }

        header { padding: 50px 20px 30px; text-align: center; }
        h1 { font-family: 'Cinzel'; font-size: 2.8rem; color: var(--ouro-brilho); }
        .sub-header { color: var(--ouro-base); font-size: 11px; letter-spacing: 4px; font-weight: 700; text-transform: uppercase; margin-top: 5px; }

        .menu-container { padding: 15px; max-width: 700px; margin: auto; padding-bottom: 140px; }
        
        .section-header { margin: 35px 0 15px; display: flex; align-items: center; gap: 15px; }
        .section-header hr { flex: 1; border: 0; border-top: 1px solid rgba(212,175,55,0.3); }
        .section-title { font-family: 'Cinzel'; color: var(--ouro-brilho); font-size: 1.2rem; font-weight: 700; text-transform: uppercase; }

        /* Estilo do Card Sem PNG */
        .card-item {
            background: linear-gradient(145deg, var(--v-imperial), #021a14);
            border: var(--borda); border-radius: 15px; margin-bottom: 20px;
            padding: 20px; display: flex; align-items: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        
        .icon-placeholder {
            width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--ouro-base);
            margin-right: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
            background: rgba(212, 175, 55, 0.1); color: var(--ouro-brilho); font-weight: 900; font-size: 1.5rem;
        }

        .info { flex: 1; }
        .info h3 { font-family: 'Cinzel'; color: var(--ouro-brilho); font-size: 1.1rem; margin-bottom: 5px; }
        .info p { font-size: 0.85rem; color: #cbd5d3; line-height: 1.4; margin-bottom: 12px; }
        .price-tag { 
            background: rgba(212,175,55,0.15); color: var(--ouro-brilho); 
            padding: 6px 14px; border-radius: 8px; font-size: 0.9rem; 
            font-weight: 700; border: 1px solid var(--ouro-base); display: inline-block;
        }

        /* Carrinho e Checkout */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: flex-end; }
        .sheet {
            width: 100%; background: var(--v-imperial); border-top: 5px solid var(--ouro-base);
            border-radius: 30px 30px 0 0; padding: 30px 20px; max-height: 95vh; overflow-y: auto;
        }

        .input-detalhado { 
            width: 100%; padding: 15px; background: rgba(0,0,0,0.4); 
            border: 1px solid rgba(212, 175, 55, 0.4); color: #fff; 
            margin-bottom: 12px; border-radius: 10px; font-size: 1rem;
        }

        .sel-box { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(212, 175, 55, 0.2); 
            padding: 18px; margin-bottom: 12px; border-radius: 12px; display: flex; justify-content: space-between;
        }
        .sel-box.active { background: rgba(212, 175, 55, 0.25); border-color: var(--ouro-brilho); }

        .btn-premium { 
            background: var(--ouro-gradiente); color: #000; border: none; 
            padding: 20px; width: 100%; font-weight: 900; border-radius: 12px; 
            text-transform: uppercase; cursor: pointer; font-size: 1rem;
        }

        .float-bar { 
            position: fixed; bottom: 25px; left: 20px; right: 20px; 
            background: var(--ouro-gradiente); color: #000; padding: 20px; 
            display: none; justify-content: space-between; border-radius: 15px; 
            font-weight: 900; z-index: 1000;
        }
    </style>
</head>
<body>

<div id="splash">
    <svg class="draw-logo" viewBox="0 0 100 100"><path d="M50 10 L90 50 L50 90 L10 50 Z M50 20 L80 50 L50 80 L20 50 Z" /></svg>
    <div class="splash-title">CALDOS PAES</div>
</div>

<header>
    <h1>Caldos Paes</h1>
    <div class="sub-header">Tradição & Sabor Imperial</div>
</header>

<div class="menu-container">
    <div class="section-header"><span class="section-title">Nossos Caldos</span><hr></div>
    <div id="lista-caldos"></div>

    <div class="section-header"><span class="section-title">Acompanhamentos</span><hr></div>
    <div id="lista-adicionais"></div>
</div>

<div class="float-bar" id="cart-btn" onclick="abrirCheckout()">
    <span>📦 VER MEU PEDIDO</span>
    <span id="cart-val">R$ 0,00</span>
</div>

<div class="overlay" id="size-overlay">
    <div class="sheet">
        <h2 id="size-title" style="color:var(--ouro-brilho); margin-bottom:25px; font-family:'Cinzel'; text-align:center;"></h2>
        <div id="size-options"></div>
        <button class="btn-premium" onclick="confirmarTamanho()">ADICIONAR AO CARRINHO</button>
        <p onclick="fechar()" style="text-align:center; color:var(--ouro-base); margin-top:20px; cursor:pointer;">VOLTAR</p>
    </div>
</div>

<div class="overlay" id="checkout-overlay">
    <div class="sheet">
        <h2 style="color:var(--ouro-brilho); margin-bottom:25px; text-align:center; font-family:'Cinzel'">Finalizar Pedido</h2>
        <div id="checkout-endereco">
            <div style="display:flex; gap:10px;">
                <input type="text" id="end-rua" class="input-detalhado" style="flex:3" placeholder="Rua / Avenida">
                <input type="text" id="end-num" class="input-detalhado" style="flex:1" placeholder="Nº">
            </div>
            <input type="text" id="end-bairro" class="input-detalhado" placeholder="Bairro">
            <input type="text" id="end-ponto" class="input-detalhado" placeholder="Ponto de Referência (Opcional)">
        </div>
        <div id="resumo-carrinho" style="margin: 20px 0; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; border: 1px solid rgba(212,175,55,0.1);"></div>
        <p style="color:var(--ouro-base); font-size:11px; margin-bottom:10px; font-weight:700;">FORMA DE PAGAMENTO</p>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <div class="sel-box" style="flex:1" onclick="handlePagamento('Pix', this)">PIX</div>
            <div class="sel-box" style="flex:1" onclick="handlePagamento('Dinheiro', this)">DINHEIRO</div>
        </div>
        <div id="troco-pergunta" style="display:none; background: rgba(212,175,55,0.08); padding: 15px; border-radius: 12px; margin-bottom: 15px;">
            <input type="number" id="troco-valor" class="input-detalhado" placeholder="Troco para quanto?">
        </div>
        <button id="final-btn" class="btn-premium" onclick="enviarWhatsApp()">🚀 ENVIAR NO WHATSAPP</button>
        <p onclick="fechar()" style="text-align:center; color:var(--ouro-base); margin-top:20px; cursor:pointer;">CONTINUAR COMPRANDO</p>
    </div>
</div>

<script>
// FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyAPvJJ9_O8GgLx3f7bCdbNfhzwuNwFBCuw",
    authDomain: "caldos-paes.firebaseapp.com",
    projectId: "caldos-paes",
    storageBucket: "caldos-paes.firebasestorage.app",
    messagingSenderId: "926863375495",
    appId: "1:926863375495:web:635a5b8986b986deeb4c22"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// DADOS DO CARDÁPIO
const caldos = [
    { id: 1, letra: "C", nome: "Caldo Cuiabano", p350: 15, p500: 25, d: "Caldo grosso de mandioca com carne moída bem temperada e cheiro verde." },
    { id: 2, letra: "M", nome: "Caldo de Milho", p350: 18, p500: 25, d: "Caldo de milho batido com frango desfiado e pedacinhos de bacon." },
    { id: 4, letra: "F", nome: "Caldo de Feijão", p350: 17, p500: 30, d: "Caldo de feijão carioca com bacon, calabresa e um toque de pimenta." }
];

const acompanhamentos = [
    { id: 101, letra: "V", nome: "Cheiro Verde", preco: 0, d: "Fresco e picadinho." },
    { id: 102, letra: "T", nome: "Torrada (4 un)", preco: 6, d: "Crocantes na manteiga." },
    { id: 103, letra: "O", nome: "Ovo de Codorna", preco: 3, d: "Porção de ovos de codorna cozidos." }
];

let cart = [];
let pagSel = '';
let itemTemp = null;
let tSel = null;

// RENDERIZAÇÃO
const listC = document.getElementById('lista-caldos');
caldos.forEach(i => {
    listC.innerHTML += `
        <div class="card-item" onclick="openSize(${i.id})">
            <div class="icon-placeholder">${i.letra}</div>
            <div class="info">
                <h3>${i.nome}</h3>
                <p>${i.d}</p>
                <div class="price-tag">A partir de R$ ${i.p350},00</div>
            </div>
        </div>`;
});

const listA = document.getElementById('lista-adicionais');
acompanhamentos.forEach(i => {
    listA.innerHTML += `
        <div class="card-item" onclick="addAoCarrinho('${i.nome}', ${i.preco})">
            <div class="icon-placeholder" style="border-radius: 8px;">${i.letra}</div>
            <div class="info">
                <h3>${i.nome}</h3>
                <p>${i.d}</p>
                <div class="price-tag">R$ ${i.preco},00</div>
            </div>
            <span style="color:var(--ouro-base); font-size: 2rem; font-weight:900;">+</span>
        </div>`;
});

function openSize(id) {
    itemTemp = caldos.find(x => x.id === id);
    document.getElementById('size-title').innerText = itemTemp.nome;
    document.getElementById('size-options').innerHTML = `
        <div class="sel-box" onclick="setT(${itemTemp.p350}, '350ml', this)"><span>350ml</span><b>R$ ${itemTemp.p350},00</b></div>
        <div class="sel-box" onclick="setT(${itemTemp.p500}, '500ml', this)"><span>500ml</span><b>R$ ${itemTemp.p500},00</b></div>
    `;
    document.getElementById('size-overlay').style.display = 'flex';
}

function setT(p, tam, el) {
    tSel = { p, tam };
    document.querySelectorAll('.sel-box').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
}

function confirmarTamanho() {
    if(!tSel) return alert("Selecione o tamanho!");
    addAoCarrinho(`${itemTemp.nome} (${tSel.tam})`, tSel.p);
    fechar();
}

function addAoCarrinho(nome, preco) {
    const ex = cart.find(x => x.n === nome);
    if(ex) ex.q++; else cart.push({ n: nome, p: preco, q: 1 });
    atualizarTotal();
}

function atualizarTotal() {
    const sub = cart.reduce((a, b) => a + (b.p * b.q), 0);
    document.getElementById('cart-btn').style.display = cart.length > 0 ? 'flex' : 'none';
    document.getElementById('cart-val').innerText = `R$ ${(sub + 7).toFixed(2)}`;
}

function abrirCheckout() {
    const res = document.getElementById('resumo-carrinho');
    const sub = cart.reduce((a, b) => a + (b.p * b.q), 0);
    res.innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:13px;"><span>${i.q}x ${i.n}</span><b>R$ ${(i.p*i.q).toFixed(2)}</b></div>`).join('') + 
    `<div style="border-top: 1px solid rgba(212,175,55,0.2); margin-top:10px; padding-top:10px; font-weight:900; color:var(--ouro-brilho); display:flex; justify-content:space-between;"><span>TOTAL (c/ Entrega)</span><span>R$ ${(sub+7).toFixed(2)}</span></div>`;
    document.getElementById('checkout-overlay').style.display = 'flex';
}

function handlePagamento(p, el) {
    pagSel = p;
    document.querySelectorAll('.sel-box').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('troco-pergunta').style.display = p === 'Dinheiro' ? 'block' : 'none';
}

function fechar() { document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none'); tSel = null; }

async function enviarWhatsApp() {
    const rua = document.getElementById('end-rua').value;
    const num = document.getElementById('end-num').value;
    const bairro = document.getElementById('end-bairro').value;
    if(!rua || !num || !bairro || !pagSel) return alert("Preencha endereço e pagamento!");

    const sub = cart.reduce((a, b) => a + (b.p * b.q), 0);
    const total = (sub + 7).toFixed(2);
    const itensTxt = cart.map(i => `${i.q}x ${i.n}`).join(', ');

    try {
        await db.collection("pedidos").add({
            itens: itensTxt,
            endereco: { rua, numero: num, bairro, ponto: document.getElementById('end-ponto').value },
            pagamento: pagSel,
            total: total,
            data: new Date().toLocaleString('pt-BR')
        });

        let msg = `*NOVO PEDIDO - CALDOS PAES*\n\n*ITENS:* ${itensTxt}\n\n📍 *ENTREGA:* ${rua}, ${num}\n🏘 Bairro: ${bairro}\n💳 *PAGAMENTO:* ${pagSel}\n💰 *TOTAL: R$ ${total}*`;
        window.open(`https://wa.me/5566992168397?text=${encodeURIComponent(msg)}`);
    } catch (e) { alert("Erro ao salvar pedido!"); }
}

setTimeout(() => {
    document.getElementById('splash').style.opacity = '0';
    setTimeout(() => document.getElementById('splash').remove(), 1000);
}, 3200);
</script>
</body>
</html>
